<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية الخصم | Khasm Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .admin-panel { display: none; border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
        .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 bg-slate-950">

    <header class="text-center py-8">
        <h1 class="text-5xl font-black text-red-600 tracking-tighter italic uppercase">KHASM SHOP</h1>
        <p class="text-gray-400 mt-2 font-bold">إمبراطورية شحن الشدات 🇸🇩</p>
    </header>

    <div id="adminPanel" class="admin-panel glass p-6 rounded-3xl mb-8 glow-red max-w-2xl mx-auto">
        <h2 class="text-red-500 font-black mb-4 text-center text-xl underline">لوحة تحكم الإمبراطور 👑</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="ucAmount" type="number" placeholder="كمية الـ UC (مثلاً 60)" class="p-3 rounded-xl bg-gray-900 border border-red-900 text-white focus:outline-none focus:ring-2 focus:ring-red-600">
            <input id="ucPrice" type="number" placeholder="السعر بالجنيه السوداني" class="p-3 rounded-xl bg-gray-900 border border-red-900 text-white focus:outline-none focus:ring-2 focus:ring-red-600">
        </div>
        <button onclick="addProduct()" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-3 mt-4 rounded-xl shadow-lg transition duration-300">نشر المنتج في المتجر ✅</button>
        
        <div class="mt-6 pt-4 border-t border-red-900/30">
            <p class="text-xs text-center text-gray-500 mb-2 font-bold">إعداد عرض مؤقت للزبائن</p>
            <div class="flex gap-2">
                <input id="timerMinutes" type="number" placeholder="الدقائق" class="w-1/3 p-2 rounded-lg bg-gray-900 border border-gray-700 text-white">
                <button onclick="startTimer()" class="w-2/3 bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 rounded-lg transition text-sm italic">تشغيل عداد الخصم ⚡</button>
            </div>
        </div>
    </div>

    <div id="timerDisplay" class="hidden max-w-md mx-auto bg-red-600 text-white text-center py-3 rounded-2xl mb-8 font-black animate-pulse shadow-2xl">
        🚨 عرض صاعق ينتهي خلال: <span id="countdown" class="text-2xl ml-2">00:00</span>
    </div>

    <div id="loginSection" class="text-center py-12 glass rounded-[2rem] max-w-md mx-auto border-red-600/20 shadow-2xl">
        <div class="mb-6">
            <div class="w-20 h-20 bg-red-600 rounded-full mx-auto flex items-center justify-center mb-4 glow-red">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h3 class="text-2xl font-black italic">دخول الإمبراطورية</h3>
            <p class="text-gray-400 text-sm mt-1">سجل دخولك لتفعيل حسابك ومتابعة الأسعار</p>
        </div>
        <button onclick="login()" class="bg-white text-black font-black py-4 px-10 rounded-2xl shadow-2xl hover:bg-gray-200 transition-all flex items-center justify-center mx-auto gap-3">
            <img src="https://www.google.com/favicon.ico" class="w-6 h-6"> الدخول عبر جوجل
        </button>
    </div>

    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-4 max-w-6xl mx-auto pb-20">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعداداتك التي أرسلتها يا بطل
        const firebaseConfig = {
            apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
            authDomain: "khasmshop.firebaseapp.com",
            databaseURL: "https://khasmshop-default-rtdb.firebaseio.com",
            projectId: "khasmshop",
            storageBucket: "khasmshop.firebasestorage.app",
            messagingSenderId: "238182001615",
            appId: "1:238182001615:web:4c7ddea335df2111b440ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAIL = "mhmdfthu98@gmail.com";

        window.login = () => {
            signInWithPopup(auth, provider).catch(err => alert("خطأ: تأكد من إضافة الدومين في Firebase"));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('adminPanel').style.display = 'block';
                }
            }
        });

        window.addProduct = () => {
            const uc = document.getElementById('ucAmount').value;
            const price = document.getElementById('ucPrice').value;
            if (uc && price) {
                push(ref(db, 'products'), { uc, price });
                alert("تم إطلاق المنتج في الإمبراطورية! 🚀");
                document.getElementById('ucAmount').value = '';
                document.getElementById('ucPrice').value = '';
            }
        };

        onValue(ref(db, 'products'), (snapshot) => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            snapshot.forEach((child) => {
                const data = child.val();
                grid.innerHTML += `
                    <div class="product-card glass p-6 rounded-[2.5rem] text-center border-b-8 border-red-600 relative overflow-hidden group">
                        <div class="bg-red-600 text-white text-[10px] font-black px-4 py-1 absolute top-4 -right-8 rotate-45 w-32 shadow-lg">HOT</div>
                        <h3 class="text-5xl font-black mb-2 italic">${data.uc}<span class="text-lg text-red-500 ml-1">UC</span></h3>
                        <p class="text-2xl text-gray-300 mb-6 font-bold tracking-widest">${data.price} <span class="text-xs">ج.س</span></p>
                        <input type="number" id="id-${child.key}" placeholder="أدخل ID اللاعب هنا" class="w-full p-4 mb-4 rounded-2xl bg-black/50 border border-white/10 text-center font-bold focus:border-red-600 transition-all outline-none">
                        <button onclick="orderNow('${data.uc}', '${data.price}', '${child.key}')" class="w-full bg-red-600 hover:bg-white hover:text-red-600 py-4 rounded-2xl font-black text-xl shadow-xl transition-all">شحن الآن ⚡</button>
                        ${auth.currentUser?.email === ADMIN_EMAIL ? `<button onclick="window.deleteItem('${child.key}')" class="text-red-900 text-xs mt-4 underline">حذف المنتج</button>` : ''}
                    </div>
                `;
            });
        });

        window.deleteItem = (key) => { if(confirm('حذف المنتج؟')) remove(ref(db, `products/${key}`)); };

        window.orderNow = (uc, price, key) => {
            const playerID = document.getElementById(`id-${key}`).value;
            if (!playerID) return alert("يا إمبراطور، الـ ID ضروري للشحن!");
            const msg = `مرحباً إمبراطور الخصم، أريد شحن ${uc} شدة للـ ID: ${playerID}. السعر المتفق عليه: ${price} ج.س`;
            window.open(`https://wa.me/249916581517?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.startTimer = () => {
            const mins = document.getElementById('timerMinutes').value;
            if(mins) set(ref(db, 'promo'), { endTime: Date.now() + (mins * 60000) });
        };

        onValue(ref(db, 'promo'), (snapshot) => {
            if (snapshot.exists()) {
                const endTime = snapshot.val().endTime;
                const timerDiv = document.getElementById('timerDisplay');
                const x = setInterval(() => {
                    const dist = endTime - Date.now();
                    const m = Math.floor((dist % 3600000) / 60000);
                    const s = Math.floor((dist % 60000) / 1000);
                    if (dist < 0) { clearInterval(x); timerDiv.classList.add('hidden'); return; }
                    timerDiv.classList.remove('hidden');
                    document.getElementById('countdown').innerHTML = `${m}:${s < 10 ? '0'+s : s}`;
                }, 1000);
            }
        });
    </script>
</body>
</html>
